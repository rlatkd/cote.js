# CoteJS 로컬 인프라. 초기엔 Postgres 하나. (후속: redis, kafka)
# 사용: infra/ 에서  docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: cotejs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cotejs
      POSTGRES_PASSWORD: cotejs
      POSTGRES_DB: cotejs
    ports:
      - "5432:5432"
    volumes:
      - cotejs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cotejs -d cotejs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cotejs-pgdata:
